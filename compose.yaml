# Compose setup for Next + Postgres
services:
  app:
    build:
      context: .
      args:
        NODE_ENV: development
      cache_from:
        - app:latest  # réutilise le cache du dernier build
    image: app:latest  # tag l'image pour que cache_from fonctionne
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    env_file:
      - .env.docker
    volumes:
      - .:/usr/src/app                     # hot-reload du code
      - /usr/src/app/node_modules          # isole node_modules du host
      - /usr/src/app/.next                 # isole le build Next.js
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minosoa -d mino_skincare"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data: