openapi: 3.0.3
info:
  title: Mino Skincare API
  description: API for the Mino Skincare mixed showcase and e-commerce site.
  version: "1.0.0"
servers:
  - url: http://localhost:3000/api
paths:
  /auth/login:
    post:
      summary: Connexion utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/register:
    post:
      summary: Inscription utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /products:
    get:
      summary: Liste des produits
      description: Récupère la liste des produits avec filtres et pagination.
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: brandId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
          description: Recherche par nom ou description du produit.
        - name: skinType
          in: query
          schema:
            type: string
          description: Filtre par type de peau (sensible, seche, grasse, mixte, normal).
        - name: minPrice
          in: query
          schema:
            type: number
            format: float
          description: Prix minimum.
        - name: maxPrice
          in: query
          schema:
            type: number
            format: float
          description: Prix maximum.
        - name: featured
          in: query
          schema:
            type: boolean
          description: Retourne seulement les produits mis en avant.
        - name: onSale
          in: query
          schema:
            type: boolean
          description: Retourne seulement les produits en promotion.
        - name: sort
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, newest, popularity]
          description: Tri des produits.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page de résultats.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Nombre de produits par page.
      responses:
        '200':
          description: Page de produits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'
    post:
      summary: Créer un produit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Produit créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
  /products/{productId}:
    get:
      summary: Détails d'un produit
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Produit détaillé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Produit non trouvé
    patch:
      summary: Mettre à jour un produit
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Produit mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    delete:
      summary: Supprimer un produit
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Produit supprimé
  /categories:
    get:
      summary: Liste des catégories
      responses:
        '200':
          description: Liste des catégories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
  /categories/{categoryId}:
    get:
      summary: Détails d'une catégorie
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Catégorie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
  /brands:
    get:
      summary: Liste des marques
      responses:
        '200':
          description: Liste des marques
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Brand'
  /users:
    get:
      summary: Liste des utilisateurs
      responses:
        '200':
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /users/{userId}:
    get:
      summary: Détails d'un utilisateur
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      summary: Mettre à jour un utilisateur
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Utilisateur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/{userId}/addresses:
    get:
      summary: Liste des adresses d'un utilisateur
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des adresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
    post:
      summary: Ajouter une adresse
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressCreate'
      responses:
        '201':
          description: Adresse créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
  /users/{userId}/addresses/{addressId}:
    patch:
      summary: Mettre à jour une adresse
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressUpdate'
      responses:
        '200':
          description: Adresse mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
    delete:
      summary: Supprimer une adresse
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Adresse supprimée
  /cart-items:
    get:
      summary: Liste des articles du panier
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Contenu du panier
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CartItem'
    post:
      summary: Ajouter un article au panier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemCreate'
      responses:
        '201':
          description: Article ajouté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItem'
  /cart-items/{cartItemId}:
    patch:
      summary: Mettre à jour la quantité d'un panier
      parameters:
        - name: cartItemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemUpdate'
      responses:
        '200':
          description: Article modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItem'
    delete:
      summary: Supprimer un article du panier
      parameters:
        - name: cartItemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Article supprimé
  /orders:
    get:
      summary: Liste des commandes
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Liste des commandes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
    post:
      summary: Créer une commande
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '201':
          description: Commande créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
  /orders/{orderId}:
    get:
      summary: Détails d'une commande
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Commande
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Commande non trouvée
    patch:
      summary: Mettre à jour le statut d'une commande
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdate'
      responses:
        '200':
          description: Statut mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
  /orders/{orderId}/payments:
    get:
      summary: Paiements d'une commande
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des paiements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
    post:
      summary: Ajouter un paiement à une commande
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreate'
      responses:
        '201':
          description: Paiement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
  /orders/{orderId}/shipments:
    get:
      summary: Livraisons d'une commande
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des livraisons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shipment'
  /products/{productId}/reviews:
    get:
      summary: Avis d'un produit
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Avis du produit
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
    post:
      summary: Ajouter un avis produit
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
      responses:
        '201':
          description: Avis créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        compareAtPrice:
          type: number
          format: float
          nullable: true
        costPrice:
          type: number
          format: float
          nullable: true
        sku:
          type: string
        stock:
          type: integer
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        isOnSale:
          type: boolean
        weight:
          type: number
          format: float
          nullable: true
        dimensions:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        images:
          type: array
          items:
            type: string
        skinType:
          type: string
        ingredients:
          type: string
        usage:
          type: string
        benefits:
          type: string
        categoryId:
          type: integer
          nullable: true
        brandId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProductCreate:
      type: object
      required:
        - name
        - price
        - sku
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        compareAtPrice:
          type: number
          format: float
          nullable: true
        costPrice:
          type: number
          format: float
          nullable: true
        sku:
          type: string
        stock:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true
        isFeatured:
          type: boolean
          default: false
        isOnSale:
          type: boolean
          default: false
        weight:
          type: number
          format: float
          nullable: true
        dimensions:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        images:
          type: array
          items:
            type: string
          nullable: true
        skinType:
          type: string
        ingredients:
          type: string
        usage:
          type: string
        benefits:
          type: string
        categoryId:
          type: integer
          nullable: true
        brandId:
          type: integer
          nullable: true
    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        compareAtPrice:
          type: number
          format: float
          nullable: true
        costPrice:
          type: number
          format: float
          nullable: true
        stock:
          type: integer
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        isOnSale:
          type: boolean
        weight:
          type: number
          format: float
          nullable: true
        dimensions:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        images:
          type: array
          items:
            type: string
          nullable: true
        skinType:
          type: string
        ingredients:
          type: string
        usage:
          type: string
        benefits:
          type: string
        categoryId:
          type: integer
          nullable: true
        brandId:
          type: integer
          nullable: true
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        slug:
          type: string
        createdAt:
          type: string
          format: date-time
    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        logo:
          type: string
        website:
          type: string
        createdAt:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        role:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        role:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    Address:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
        street:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        isDefault:
          type: boolean
    AddressCreate:
      type: object
      required:
        - type
        - street
        - city
        - postalCode
        - country
      properties:
        type:
          type: string
        street:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        isDefault:
          type: boolean
    AddressUpdate:
      type: object
      properties:
        type:
          type: string
        street:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        isDefault:
          type: boolean
    CartItem:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        productId:
          type: integer
        quantity:
          type: integer
        addedAt:
          type: string
          format: date-time
        product:
          $ref: '#/components/schemas/Product'
    CartItemCreate:
      type: object
      required:
        - userId
        - productId
        - quantity
      properties:
        userId:
          type: integer
        productId:
          type: integer
        quantity:
          type: integer
    CartItemUpdate:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        price:
          type: number
          format: float
        total:
          type: number
          format: float
    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
        totalAmount:
          type: number
          format: float
        taxAmount:
          type: number
          format: float
        shippingAmount:
          type: number
          format: float
        discountAmount:
          type: number
          format: float
        notes:
          type: string
          nullable: true
        billingAddress:
          $ref: '#/components/schemas/Address'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        userId:
          type: integer
        orderItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrderCreate:
      type: object
      required:
        - userId
        - orderItems
      properties:
        userId:
          type: integer
        orderItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        billingAddress:
          $ref: '#/components/schemas/AddressCreate'
        shippingAddress:
          $ref: '#/components/schemas/AddressCreate'
        notes:
          type: string
    OrderStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    ProductPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        page:
          type: integer
        limit:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean
    Payment:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        amount:
          type: number
          format: float
        method:
          type: string
        status:
          type: string
        transactionId:
          type: string
          nullable: true
        paymentDate:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
    PaymentCreate:
      type: object
      required:
        - amount
        - method
      properties:
        amount:
          type: number
          format: float
        method:
          type: string
        transactionId:
          type: string
        paymentDate:
          type: string
          format: date-time
        notes:
          type: string
    Shipment:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        trackingNumber:
          type: string
          nullable: true
        carrier:
          type: string
          nullable: true
        status:
          type: string
        shippedAt:
          type: string
          format: date-time
          nullable: true
        deliveredAt:
          type: string
          format: date-time
          nullable: true
        estimatedDelivery:
          type: string
          format: date-time
          nullable: true
    Review:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        productId:
          type: integer
        rating:
          type: integer
        title:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        isVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
    ReviewCreate:
      type: object
      required:
        - userId
        - rating
      properties:
        userId:
          type: integer
        rating:
          type: integer
        title:
          type: string
        comment:
          type: string
        isVerified:
          type: boolean
          default: false
