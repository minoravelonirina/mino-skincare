openapi: 3.0.3
info:
  description: API for the Mino Skincare mixed showcase and e-commerce site.
  title: Mino Skincare API
  version: 1.0.0
servers:
- url: http://localhost:3000/api
paths:
  /auth/login:
    post:
      operationId: authLoginPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Connexion réussie
      summary: Connexion utilisateur
      x-eov-operation-handler: controllers/DefaultController
  /auth/register:
    post:
      operationId: authRegisterPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Utilisateur créé
      summary: Inscription utilisateur
      x-eov-operation-handler: controllers/DefaultController
  /products:
    get:
      description: Récupère la liste des produits avec filtres et pagination.
      operationId: productsGET
      parameters:
      - explode: true
        in: query
        name: categoryId
        required: false
        schema:
          type: integer
        style: form
      - explode: true
        in: query
        name: brandId
        required: false
        schema:
          type: integer
        style: form
      - description: Recherche par nom ou description du produit.
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - description: "Filtre par type de peau (sensible, seche, grasse, mixte, normal)."
        explode: true
        in: query
        name: skinType
        required: false
        schema:
          type: string
        style: form
      - description: Prix minimum.
        explode: true
        in: query
        name: minPrice
        required: false
        schema:
          format: float
          type: number
        style: form
      - description: Prix maximum.
        explode: true
        in: query
        name: maxPrice
        required: false
        schema:
          format: float
          type: number
        style: form
      - description: Retourne seulement les produits mis en avant.
        explode: true
        in: query
        name: featured
        required: false
        schema:
          type: boolean
        style: form
      - description: Retourne seulement les produits en promotion.
        explode: true
        in: query
        name: onSale
        required: false
        schema:
          type: boolean
        style: form
      - description: Tri des produits.
        explode: true
        in: query
        name: sort
        required: false
        schema:
          enum:
          - price_asc
          - price_desc
          - newest
          - popularity
          type: string
        style: form
      - description: Page de résultats.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Nombre de produits par page.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"
          description: Page de produits
      summary: Liste des produits
      x-eov-operation-handler: controllers/DefaultController
    post:
      operationId: productsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
          description: Produit créé
      summary: Créer un produit
      x-eov-operation-handler: controllers/DefaultController
  /products/{productId}:
    delete:
      operationId: productsProductIdDELETE
      parameters:
      - explode: false
        in: path
        name: productId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "204":
          description: Produit supprimé
      summary: Supprimer un produit
      x-eov-operation-handler: controllers/DefaultController
    get:
      operationId: productsProductIdGET
      parameters:
      - explode: false
        in: path
        name: productId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
          description: Produit détaillé
        "404":
          description: Produit non trouvé
      summary: Détails d'un produit
      x-eov-operation-handler: controllers/DefaultController
    patch:
      operationId: productsProductIdPATCH
      parameters:
      - explode: false
        in: path
        name: productId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
          description: Produit mis à jour
      summary: Mettre à jour un produit
      x-eov-operation-handler: controllers/DefaultController
  /categories:
    get:
      operationId: categoriesGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Category"
                type: array
          description: Liste des catégories
      summary: Liste des catégories
      x-eov-operation-handler: controllers/DefaultController
  /categories/{categoryId}:
    get:
      operationId: categoriesCategoryIdGET
      parameters:
      - explode: false
        in: path
        name: categoryId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
          description: Catégorie
      summary: Détails d'une catégorie
      x-eov-operation-handler: controllers/DefaultController
  /brands:
    get:
      operationId: brandsGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Brand"
                type: array
          description: Liste des marques
      summary: Liste des marques
      x-eov-operation-handler: controllers/DefaultController
  /users:
    get:
      operationId: usersGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/User"
                type: array
          description: Liste des utilisateurs
      summary: Liste des utilisateurs
      x-eov-operation-handler: controllers/DefaultController
  /users/{userId}:
    get:
      operationId: usersUserIdGET
      parameters:
      - explode: false
        in: path
        name: userId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Utilisateur
      summary: Détails d'un utilisateur
      x-eov-operation-handler: controllers/DefaultController
    patch:
      operationId: usersUserIdPATCH
      parameters:
      - explode: false
        in: path
        name: userId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Utilisateur mis à jour
      summary: Mettre à jour un utilisateur
      x-eov-operation-handler: controllers/DefaultController
  /users/{userId}/addresses:
    get:
      operationId: usersUserIdAddressesGET
      parameters:
      - explode: false
        in: path
        name: userId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Address"
                type: array
          description: Liste des adresses
      summary: Liste des adresses d'un utilisateur
      x-eov-operation-handler: controllers/DefaultController
    post:
      operationId: usersUserIdAddressesPOST
      parameters:
      - explode: false
        in: path
        name: userId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressCreate"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
          description: Adresse créée
      summary: Ajouter une adresse
      x-eov-operation-handler: controllers/DefaultController
  /users/{userId}/addresses/{addressId}:
    delete:
      operationId: usersUserIdAddressesAddressIdDELETE
      parameters:
      - explode: false
        in: path
        name: userId
        required: true
        schema:
          type: integer
        style: simple
      - explode: false
        in: path
        name: addressId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "204":
          description: Adresse supprimée
      summary: Supprimer une adresse
      x-eov-operation-handler: controllers/DefaultController
    patch:
      operationId: usersUserIdAddressesAddressIdPATCH
      parameters:
      - explode: false
        in: path
        name: userId
        required: true
        schema:
          type: integer
        style: simple
      - explode: false
        in: path
        name: addressId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressUpdate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
          description: Adresse mise à jour
      summary: Mettre à jour une adresse
      x-eov-operation-handler: controllers/DefaultController
  /cart-items:
    get:
      operationId: cart_itemsGET
      parameters:
      - explode: true
        in: query
        name: userId
        required: true
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/CartItem"
                type: array
          description: Contenu du panier
      summary: Liste des articles du panier
      x-eov-operation-handler: controllers/DefaultController
    post:
      operationId: cart_itemsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemCreate"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
          description: Article ajouté
      summary: Ajouter un article au panier
      x-eov-operation-handler: controllers/DefaultController
  /cart-items/{cartItemId}:
    delete:
      operationId: cart_itemsCartItemIdDELETE
      parameters:
      - explode: false
        in: path
        name: cartItemId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "204":
          description: Article supprimé
      summary: Supprimer un article du panier
      x-eov-operation-handler: controllers/DefaultController
    patch:
      operationId: cart_itemsCartItemIdPATCH
      parameters:
      - explode: false
        in: path
        name: cartItemId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
          description: Article modifié
      summary: Mettre à jour la quantité d'un panier
      x-eov-operation-handler: controllers/DefaultController
  /orders:
    get:
      operationId: ordersGET
      parameters:
      - explode: true
        in: query
        name: userId
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Order"
                type: array
          description: Liste des commandes
      summary: Liste des commandes
      x-eov-operation-handler: controllers/DefaultController
    post:
      operationId: ordersPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
          description: Commande créée
      summary: Créer une commande
      x-eov-operation-handler: controllers/DefaultController
  /orders/{orderId}:
    get:
      operationId: ordersOrderIdGET
      parameters:
      - explode: false
        in: path
        name: orderId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
          description: Commande
        "404":
          description: Commande non trouvée
      summary: Détails d'une commande
      x-eov-operation-handler: controllers/DefaultController
    patch:
      operationId: ordersOrderIdPATCH
      parameters:
      - explode: false
        in: path
        name: orderId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
          description: Statut mis à jour
      summary: Mettre à jour le statut d'une commande
      x-eov-operation-handler: controllers/DefaultController
  /orders/{orderId}/payments:
    get:
      operationId: ordersOrderIdPaymentsGET
      parameters:
      - explode: false
        in: path
        name: orderId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Payment"
                type: array
          description: Liste des paiements
      summary: Paiements d'une commande
      x-eov-operation-handler: controllers/DefaultController
    post:
      operationId: ordersOrderIdPaymentsPOST
      parameters:
      - explode: false
        in: path
        name: orderId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCreate"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
          description: Paiement créé
      summary: Ajouter un paiement à une commande
      x-eov-operation-handler: controllers/DefaultController
  /orders/{orderId}/shipments:
    get:
      operationId: ordersOrderIdShipmentsGET
      parameters:
      - explode: false
        in: path
        name: orderId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Shipment"
                type: array
          description: Liste des livraisons
      summary: Livraisons d'une commande
      x-eov-operation-handler: controllers/DefaultController
  /products/{productId}/reviews:
    get:
      operationId: productsProductIdReviewsGET
      parameters:
      - explode: false
        in: path
        name: productId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Review"
                type: array
          description: Avis du produit
      summary: Avis d'un produit
      x-eov-operation-handler: controllers/DefaultController
    post:
      operationId: productsProductIdReviewsPOST
      parameters:
      - explode: false
        in: path
        name: productId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCreate"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
          description: Avis créé
      summary: Ajouter un avis produit
      x-eov-operation-handler: controllers/DefaultController
